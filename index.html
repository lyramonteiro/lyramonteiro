<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L. Monteiro | Portfolio</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">

    <style>
        /* ==================== Variáveis de Tema ==================== */
        :root {
            /* Modo Claro (Default se .is--dark não estiver presente) */
            --bg-overlay: rgba(240, 242, 245, 0.85);
            --text-main: #141d2b;
            --text-sub: #4a5568;
            --text-handle: #718096;
            --accent: #6b9e23; /* Verde um pouco mais escuro para contraste no claro */
            --card-bg: rgba(255, 255, 255, 0.95);
            --border-color: #e2e8f0;
            --btn-text: #ffffff;
        }

        body.is--dark {
            /* Modo Escuro (Baseado na referência visual) */
            --bg-overlay: rgba(20, 29, 43, 0.85); /* Tom escuro azulado do HTB */
            --text-main: #ffffff;
            --text-sub: #a0aec0;
            --text-handle: #64748b;
            --accent: #9fe03a; /* Verde Neon do HTB */
            --card-bg: rgba(30, 41, 59, 0.8);
            --border-color: #334155;
            --btn-text: #141d2b;
        }

        /* ==================== Resets e Base ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mantém como single page fixa */
        }

        /* ==================== Background Carousel ==================== */
        .hero__carousel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .splide__slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ==================== Overlay ==================== */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--bg-overlay);
            z-index: 2;
            backdrop-filter: blur(4px); /* Dá um efeito de vidro fosco suave */
        }

        /* ==================== Layout Principal ==================== */
        .main-wrapper {
            position: relative;
            z-index: 3;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* ==================== Controles (Topo) ==================== */
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .lang-switch select {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 5px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .theme-switch {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* ==================== Conteúdo do Hero ==================== */
        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }

        .profile-img-container {
            position: relative;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            padding: 4px; /* Cria um espaço entre a imagem e a borda verde */
        }

        .profile-name {
            color: var(--text-main);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-handle {
            color: var(--text-handle);
            font-size: 1.2rem;
            font-weight: 400;
        }

        .profile-bio {
            color: var(--text-main);
            font-size: 1.1rem;
            font-family: monospace; /* Fonte mono para dar o aspecto de código/dev */
            margin: 15px 0;
            line-height: 1.5;
        }

        .profile-location {
            color: var(--text-sub);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 30px;
        }

        /* ==================== Botão ==================== */
        .btn-portfolio {
            background-color: var(--accent);
            color: var(--btn-text);
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--accent);
            transition: all 0.3s ease;
        }

        .btn-portfolio:hover {
            background-color: transparent;
            color: var(--accent);
            box-shadow: 0 0 15px rgba(159, 224, 58, 0.4);
        }
    </style>
</head>
<body class="is--dark">

    <div class="splide hero__carousel" aria-label="Background Images">
        <div class="splide__track">
            <ul class="splide__list">
                <li class="splide__slide">
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1920&auto=format&fit=crop" alt="Cybersecurity 1">
                </li>
                <li class="splide__slide">
                    <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1920&auto=format&fit=crop" alt="Matrix Code">
                </li>
                <li class="splide__slide">
                    <img src="https://images.unsplash.com/photo-1618401471353-b98afee0b2eb?q=80&w=1920&auto=format&fit=crop" alt="Setup">
                </li>
            </ul>
        </div>
    </div>

    <div class="hero-overlay"></div>

    <div class="main-wrapper">
        
        <div class="controls">
            <div class="lang-switch">
                <select id="langSelector">
                    <option value="pt" selected>PT</option>
                    <option value="en">EN</option>
                    <option value="es">ES</option>
                </select>
            </div>
            <button class="theme-switch" id="themeToggle" title="Toggle Theme">
                <span id="themeIcon">☀️</span> </button>
        </div>

        <main class="profile-card">
            <div class="profile-img-container">
                <img src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?q=80&w=300&auto=format&fit=crop" alt="L. Monteiro" class="profile-img">
            </div>
            
            <h1 class="profile-name">
                L. Monteiro <span class="profile-handle">@neopunk</span>
            </h1>
            
            <p class="profile-bio" data-i18n="bio">
                Um ser humano curioso que por acaso é um Desenvolvedor.
            </p>
            
            <div class="profile-location">
                📍 <span data-i18n="location">Brasil</span>
            </div>

            <a href="https://seu-portfolio-url.com" target="_blank" class="btn-portfolio" data-i18n="btn">
                Ver portfólio completo
            </a>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>

    <script>
        // ==================== 1. Setup do Splide ====================
        document.addEventListener('DOMContentLoaded', function () {
            // Utilizando a configuração exata solicitada
            var splide = new Splide('.hero__carousel', {
                type: 'loop',
                perPage: 1,
                arrows: true,
                pagination: true,
                autoplay: true,
                interval: 5000,
                pauseOnHover: true,
            });
            
            // O código original tinha .mount(window.splide.Extensions)
            // Se as extensões estiverem disponíveis, ele monta com elas. 
            // Caso contrário, monta o padrão para evitar erros no console.
            if (window.splide && window.splide.Extensions) {
                splide.mount(window.splide.Extensions);
            } else {
                splide.mount();
            }
        });

        // ==================== 2. Lógica de Tema (Claro/Escuro) ====================
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const body = document.body;

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('is--dark');
            
            if (body.classList.contains('is--dark')) {
                themeIcon.textContent = '☀️'; // Mostra o sol para indicar opção de modo claro
            } else {
                themeIcon.textContent = '🌙'; // Mostra a lua para indicar opção de modo escuro
            }
        });

        // ==================== 3. Lógica de Internacionalização (i18n) ====================
        const translations = {
            pt: {
                bio: "Um ser humano curioso que por acaso é um Desenvolvedor.",
                location: "Brasil",
                btn: "Ver portfólio completo"
            },
            en: {
                bio: "A curious human being that happens to be a Developer.",
                location: "Brazil",
                btn: "View full portfolio"
            },
            es: {
                bio: "Un ser humano curioso que resulta ser un Desarrollador.",
                location: "Brasil",
                btn: "Ver portafolio completo"
            }
        };

        const langSelector = document.getElementById('langSelector');
        
        langSelector.addEventListener('change', (e) => {
            const lang = e.target.value;
            
            // Atualiza todos os elementos que possuem o atributo data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    el.textContent = translations[lang][key];
                }
            });
        });
    </script>
</body>
</html>
